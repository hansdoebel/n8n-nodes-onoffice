name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          # Check if the tagged commit exists on main
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/main'; then
            echo "Error: Tag is not on main branch"
            exit 1
          fi
          echo "Tag verified on main branch"

      - name: Verify version is not reserved on npm
        run: |
          VERSION=$(jq -r '.version' package.json)
          PKG=$(jq -r '.name' package.json)
          echo "Checking if $PKG@$VERSION is available on npm..."
          # npm's "time" map lists every version ever published, including unpublished
          # ones (which are permanently reserved). Fail fast before provenance is signed.
          if curl -sfL "https://registry.npmjs.org/$PKG" \
               | jq -e --arg v "$VERSION" '.time[$v]' > /dev/null; then
            echo "::error::Version $VERSION was published before (possibly unpublished). npm permanently reserves these numbers. Bump to a different version."
            exit 1
          fi
          echo "Version $VERSION is available."

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@11.5.1
      - run: npm --version
      - run: bun install
      - run: bun run build
      - run: bun run lint
      - run: bun test
      - run: npm publish --access public
